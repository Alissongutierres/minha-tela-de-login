<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tela de login</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <main>
        <div class="fundo-imagem">
            <div class="caixa-texto">
              <h1>Explore Horizontes</h1>
              <h3>Onde os seus destinos dos sonhos se tornam realidade.</h3>
              <p>Descubra novos lugares e crie memórias inesquecíveis com a gente.</p>
            </div>

            <div class="formulario">
              <form action="login.php" method="get" autocomplete="on">
               <div class="login">
                <label for="iemail">Email</label>
                <input type="email" id="iemail" name="email" placeholder="digite seu email" required>
               </div>

               <div class="login">
                <label for="isenha">Senha</label>
                <input type="password" name="senha" id="isenha" placeholder="digite sua senha" required autocomplete="current-password">
               </div>
               <a href="#">Esqueceu sua senha?</a>
               <input type="submit" value="Entrar">

               <div class="linhas">
                <span></span>
                <p>ou</p>
                <span></span>
               </div>

               <a href="#"><img class="icone" src="imagens/Marcus-Roberto-Google-Play-Google-Chrome.512.png" alt="">Entre com o Google</a>
               <a href="#">Não tem uma conta? Cadastre-se</a>
              </form>
            </div>

        </div>
    </main>
</body>
</html>
